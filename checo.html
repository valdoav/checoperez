<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="checo2.png">
    <title>Checo Pérez | Fan Page</title>
    <style>
        body {
            background-color: #061020; /* Azul Red Bull */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            color: #061020;
            padding: 2rem;
            border-radius: 15px;
            border-left: 10px solid #cc0000; /* Rojo RB */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
        }
        h1 { margin-bottom: 0.5rem; }
        .numero {
            font-size: 3rem;
            font-weight: bold;
            color: #cc0000;
            margin: 0;
        }
        .tag {
            background: #ffec00; /* Amarillo RB */
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <p class="numero">11</p>
        <h1>Sergio "Checo" Pérez</h1>
        <p>Ministro de Defensa de México</p>
        <div class="tag">Oracle Red Bull Racing</div>
        <p style="margin-top: 20px; font-size: 0.9rem;">Editado desde mi VM de Ubuntu 🚀</p>
    </div>
</body>
</html>
