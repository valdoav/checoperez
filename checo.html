<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="checo2.png">
    <title>Checo Pérez | Fan Page con Video</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            /* Usamos Flexbox para centrar la tarjeta SOBRE el video */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Evita barras de desplazamiento */
        }

        /* --- LA MAGIA DEL VIDEO DE FONDO --- */
        .video-container {
            position: fixed; /* Lo clava en la pantalla */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* ¡IMPORTANTE! Lo manda AL FONDO, detrás de todo */
            overflow: hidden;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ¡Aquí está! Adapta el video a la pantalla sin deformarlo */
            /* A veces, los videos son muy brillantes. Añadimos un filtro oscuro */
            filter: brightness(0.6); 
        }

        /* --- LA TARJETA DE PRENSA (Ligeramente retocada para que resalte más) --- */
        .card {
            background: rgba(255, 255, 255, 0.95); /* Fondo blanco con un toque de transparencia */
            color: #061020;
            padding: 2rem;
            border-radius: 15px;
            border-left: 10px solid #cc0000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); /* Sombra más fuerte */
            text-align: center;
            max-width: 400px;
            position: relative; /* Para asegurarnos de que esté sobre el video container si fuera necesario */
            z-index: 1; /* Asegura que la tarjeta esté por encima */
        }
        
        h1 { margin-bottom: 0.5rem; font-size: 1.8rem; }
        .numero {
            font-size: 3.5rem;
            font-weight: bold;
            color: #cc0000;
            margin: 0;
            line-height: 1;
        }
        .tag {
            background: #ffec00;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="videobg.mp4" type="video/mp4">
            Tu navegador no soporta videos HTML5.
        </video>
    </div>

    <div class="card">
        <p class="numero">11</p>
        <h1>Sergio "Checo" Pérez</h1>
        <p>Ministro de Defensa de México</p>
        <div class="tag">Oracle Red Bull Racing</div>
        <p style="margin-top: 25px; font-size: 0.85rem; color: #555;">Sincronizado vía GitHub 🚀</p>
    </div>

</body>
</html>
